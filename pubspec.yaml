name: distorto
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  receive_sharing_intent: ^1.8.1
  gal: ^2.3.2
  wallpaper_manager_plus: ^2.0.3
  image: ^4.2.0
  path_provider: ^2.1.0
  flutter_shaders: ^0.1.3
  flutter_shader_kit: ^0.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  shaders:
    - effects/shaders/narrow_reed.glsl
    - effects/shaders/wide_reed.glsl
    - effects/shaders/lumina.glsl
    - effects/shaders/grid.glsl
    - effects/shaders/liquid.glsl
    - effects/shaders/ripple.glsl
